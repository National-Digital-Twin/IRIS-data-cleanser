    - os-ngd-buildings

definitions:
  streams:
    os-ngd-buildings:
      type: DeclarativeStream
      name: os-ngd-buildings
      retriever:
        type: SimpleRetriever
        decoder:
          type: JsonDecoder
        paginator:
          type: DefaultPaginator
          page_token_option:
            type: RequestOption
            field_name: offset
            inject_into: request_parameter
          pagination_strategy:
            type: OffsetIncrement
            page_size: 100
            inject_on_first_request: true
        requester:
          $ref: "#/definitions/base_requester"
          path: /features/ngd/ofa/v1/collections/bld-fts-building-4/items?
          http_method: GET
          request_parameters:
            bbox: "{{ stream_partition.tile['bbox'] }}"
            filter: buildinguse='Residential Accommodation'
            bbox-crs: http://www.opengis.net/def/crs/EPSG/0/27700
        record_selector:
          type: RecordSelector
          extractor:
            type: DpathExtractor
            field_path:
              - features
              - "*"
              - properties
        partition_router:
          type: ListPartitionRouter
          values: "{{ config['5km-tiles-england'] }}"
          cursor_field: tile
      schema_loader:
        type: InlineSchemaLoader
        schema:
          $ref: "#/schemas/os-ngd-buildings"
  base_requester:
    type: HttpRequester
    url_base: https://api.os.uk
    authenticator:
      type: ApiKeyAuthenticator
      api_token: "{{ config[\"api_key\"] }}"
      inject_into:
        type: RequestOption
        field_name: key
        inject_into: header

streams:
  - $ref: "#/definitions/streams/os-ngd-buildings"

spec:
  type: Spec
  connection_specification:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    required:
      - api_key
      - 5km-tiles-england
    properties:
      api_key:
        type: string
        order: 0
        title: API Key
        airbyte_secret: true
      5km-tiles-england:
        type: string
        description: Contains 5km tile bboxes (27700) for England, by region
        order: 1
        title: 5km-tiles-england
    additionalProperties: true

