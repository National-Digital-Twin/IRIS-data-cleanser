iris_data_cleansing:
  target: dev_with_fal
  outputs:
    dev_with_fal:
      type: fal
      db_profile: dev_postgres # This points to your main adapter
    dev_postgres:
      type: postgres
      host: "{{ env_var('DB_HOST') }}"
      user: "{{ env_var('DB_USER') }}"
      password: "{{ env_var('DB_PASSWORD') }}"
      dbname: "{{ env_var('DB_NAME') }}"
      schema: "{{ env_var('DB_SCHEMA') }}"
      port: 5432
