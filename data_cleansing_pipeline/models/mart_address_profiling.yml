version: 2

models:
  - name: mart_address_profiling
    description: "Cleaned Address Profiling Dataset."
    tags: [mart]
    columns:
      - name: lmk_key
        description: Individual lodgement identifier. Guaranteed to be unique and can be used to identify a certificate in the downloads and the API
        field_type: VARCHAR 64

      - name: UPRN
        description: "Unique Property Reference Number. The UPRN submitted by an assessor or alternatively from the department’s address matching algorithm."
        # tests:
        # - unique
        # - not_null

      - name: UDPRN
        description: "Unique Delivery Point Reference Number. Royal Mail's Unique Delivery Point Reference Number."
        # tests:
        # - unique
        # - not_null

      - name: ParityAddressId
        description: "Identifier for parity address"
        # tests:
        # - unique
        # - not_null

      - name: Address
        description: "Detailed address description"
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: text

      - name: Postcode
        description: "UK postcode"
        # tests:
        # - not_null
        # - dbt_expectations.expect_column_values_to_match_regex:
        #     regex: "^[A-Z]{1,2}[0-9R][0-9A-Z]? [0-9][A-Z]{2}$" # UK postcode regex

      - name: EnvironmentalImpactRating
        description: "Environmental impact rating of the property"
        # tests:
        # - dbt_expectations.expect_column_values_to_be_between:
        #     min_value: 0
        #     max_value: 100

      - name: EnvironmentalImpactRatingBand
        description: "Rating band for the environmental impact"

      - name: FuelBills(£/yr)
        description: "Annual fuel bills in GBP"
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: double precision

      - name: RealisticFuelBill(Regional)
        description: "Annual realistic fuel bills in GBP"
      #   tests:

      - name: tCO2
        description: "tonnes of CO2 equivalent"
      #   tests:

      - name: HeatingCost(£/yr)
        description: "Current estimated annual energy costs (in GBP) for heating the property."
      #   tests:

      - name: SAPRating
        description: "SAP (Standard Assessment Procedure) rating"
        # quote: true
        tests:
          # - not_null
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: double precision
          # - dbt_expectations.expect_column_values_to_be_between:
          # min_value: 0.0
          # max_value: 200.0

      - name: SAPBand
        description: "Band classification for the SAP rating"
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: text

      - name: LodgementDate
        description: "Date lodged on the Energy Performance of Buildings Register"
        # tests:
        # - dbt_expectations.expect_column_values_to_be_date

      - name: SAPVersion
        description: "Version of SAP used for assessment"
        # tests:
        #   - dbt_expectations.expect_column_values_to_be_of_type:
        #       column_type: text

      - name: PropertyType
        description: "Describes the type of building that is being inspected. Based on planning use class."
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: text

      - name: ConstructionAgeBand
        description: "Age band when building part constructed. England & Wales only."
      #   tests:

      - name: BuiltForm
        description: "The building type of the Property e.g. Detached, Semi-Detached, Terrace etc. Together with the Property Type, the Build Form produces a structured description of the property"
      #   tests:

      - name: StoreysCount
        description: "The number of storeys in the apartment block."
      #   tests:

      - name: FlatLocation
        description: "Flat level relative to the lowest level of the property (0 for ground floor). If there is a basement, the basement is level 0 and the other floors are from 1 upwards"
      #   tests:

      - name: FlatLevel
        description: "Flat level relative to the lowest level of the property (0 for ground floor). If there is a basement, the basement is level 0 and the other floors are from 1 upwards"
      #   tests:

      - name: LowestFloorArea
        description: "Area of the floor at the lowest level (m²)"
      #   tests:

      - name: MainHeatingCategory
        description: "Overall description of the main heating source"
      #   tests:

      - name: MainFuelType
        description: "The type of fuel used to power the central heating e.g. Gas, Electricity"
      #   tests:

      - name: MainHeatingControl
        description: "Type of main heating controls. Includes both main heating systems if there are two."
      #   tests:

      - name: DerivedSAPMainHeatingCode
        description: "Derived SAP scores"
      #   tests:
      - name: HeatEmitterType
        description: "Type of emitter used for heating the property"
        #   tests:

      - name: WaterHeatingFuel
        description: "Type of fuel used to heat up water in the property"
      #   tests:
      - name: RoofConstruction
        description: "Description of the way in which the roof is constructed eg: pitched, thatched"
        #   tests:

      - name: RoofInsulationLocation
        description: "Location of the roof insulation"
      #   tests:
      - name: RoofInsulationThickness
        description: "Thickness of roof insulation used"
        #   tests:

      - name: "WallConstruction"
        description: "Description of the way in which the wall is constructed"
      #   tests:

      - name: "WallInsulationType"
        description: "Type of wall insulation"
      #   tests:

      - name: "WallInsulationThickness"
        description: "Thickness of wall insulation used"
      #   tests:

      - name: FloorConstruction
        description: "Description of the way in which the floor was constructed"
      #   tests:

      - name: FloorInsulation
        description: "Type of floor insulation"
      #   tests:

      - name: FloorInsulationThickness
        description: "Thickness of floor insulation"
      #   tests:

      - name: MultipleGlazingType
        description: "The type of glazing. From British Fenestration Rating Council or manufacturer declaration."
      #   tests:

      - name: OpenFireplacesCount
        description: "The number of Open Fireplaces in the Property. An Open Fireplace is a fireplace that still allows air to pass between the inside of the Property and the outside."
      #   tests:

      - name: Renewables
        description: "Number of renewable energy resources. Currently just shows the number of wind turbines; 0 if none."
      #   tests:

      - name: Ventilation
        description: "Identifies the type of mechanical ventilation the property has. This is required for the RdSAP calculation."
      #   tests:

      - name: WaterHeatingCost(£/yr)
        description: "GBP. Current estimated annual energy costs for hot water"
      #   tests:

      - name: LightingCost(£/yr)
        description: "GBP. Current estimated annual energy costs for lighting the property."
      #   tests:

      - name: TotalFloorArea
        description: "Total Useful Floor Area (m²)"
      #   tests:

      - name: FuzzyMatched
        description: Indicator to flag whether this UPRN was extracted from the Ordnance Survey data via fuzzy matching (1) or originates directly from the EPC data (0).
        field_type: INT
        acceptable_values: 1 | 0

    meta:
      owner: "data_engineering_team"
