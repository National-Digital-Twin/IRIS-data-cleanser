spec:
  type: Spec
  connection_specification:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    required:
      - api_key
    properties:
      api_key:
        type: string
        order: 0
        title: API Key
        airbyte_secret: true
      tiles_text_se:
        type: string
        order: 1
        title: tiles_text_se
        description: South East tiles as a single line, separated by '|||'. Each part is "minx,miny,maxx,maxy|REGION_CODE" with no trailing delimiter.
      tiles_text_sw:
        type: string
        order: 2
        title: tiles_text_sw
        description: South West tiles as a single line, separated by '|||'. Each part is "minx,miny,maxx,maxy|REGION_CODE" with no trailing delimiter.
      tiles_text_ne:
        type: string
        order: 3
        title: tiles_text_ne
        description: North East tiles as a single line, separated by '|||'. Each part is "minx,miny,maxx,maxy|REGION_CODE".
      tiles_text_nw:
        type: string
        order: 4
        title: tiles_text_nw
        description: North West tiles as a single line, separated by '|||'. Each part is "minx,miny,maxx,maxy|REGION_CODE".
      tiles_text_yh:
        type: string
        order: 5
        title: tiles_text_yh
        description: Yorkshire and The Humber tiles as a single line, separated by '|||'. Each part is "minx,miny,maxx,maxy|REGION_CODE".
      tiles_text_em:
        type: string
        order: 6
        title: tiles_text_em
        description: East Midlands tiles as a single line, separated by '|||'. Each part is "minx,miny,maxx,maxy|REGION_CODE".
      tiles_text_wm:
        type: string
        order: 7
        title: tiles_text_wm
        description: West Midlands tiles as a single line, separated by '|||'. Each part is "minx,miny,maxx,maxy|REGION_CODE".
      tiles_text_ee:
        type: string
        order: 8
        title: tiles_text_ee
        description: East of England tiles as a single line, separated by '|||'. Each part is "minx,miny,maxx,maxy|REGION_CODE".
      tiles_text_lon:
        type: string
        order: 9
        title: tiles_text_lon
        description: London tiles as a single line, separated by '|||'. Each part is "minx,miny,maxx,maxy|REGION_CODE".
    additionalProperties: true

metadata:
  assist: {}
