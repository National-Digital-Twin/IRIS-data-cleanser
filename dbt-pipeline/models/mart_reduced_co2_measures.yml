      - name: SAP
        description: "Standard Assessment Procedure rating"
        quote: true
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 300

      - name: EI
        description: "Energy Index"
        quote: true
        tests:
