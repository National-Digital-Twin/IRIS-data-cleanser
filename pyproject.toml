# ]


[tool.ruff]
line-length = 100
indent-width = 4
target-version = "py312"
exclude = ["*.ipynb", "notebooks/recommendations.py"]

[tool.ruff.lint]
select = [
  "A",
  "AIR",
  "ARG",
  "B",
  "C4",
  "C90",
  "COM",
  # "CPY",
  "D",
  "DJ",
  "DTZ",
  "E",
  # "E4", "E7", "E9",
  "ERA",
  "EXE",
  "F",
  "FA",
  "FIX",
  "FLY",
  # "FURB",
  "G",
  "I",
  "ICN",
  "INP",
  "INT",
  "ISC",
  # "LOG",
  "N",
  "NPY",
  "PD",
  "PERF",
  "PGH",
  "PIE",
  "PL",
  "PT",
  "PTH",
  "PYI",
  "Q",
  "RET",
  "RSE",
  "RUF",
  "SIM",
  "SLF",
  "SLOT",
  "T10",
  "T20",
  "TCH",
  "TD",
  "TID",
  "TRY",
  "UP",
  "W",
]
ignore = [
  "ARG001",
  "ARG002",
  "COM812",
  "D101",
  "D202",
  "D203",
  "D205",
  "D211",
  "D213",
  "D400",
  "D400",
  "D401",
  "D404",
  "D415",
  "DTZ005",
  "E203",
  "FIX002",
  "G004",
  "INP001",
  "ISC001",
  "PD901",
  "PLR0913",
  "PLR2004",
  "PT004",
  "PTH107",
  "PTH123",
  "RET504",
  "RET506",
  "RET508",
  "RUF013",
  "T100",
  "TD002",
  "TD003",
]
fixable = ["ALL"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.sqlfluff.core]
dialect = "postgres"
templater = "jinja"
sql_file_exts = ".sql,.sql.j2,.dml,.ddl"
max_line_length = 100
exclude_rules = [
  "CP02", # CP02: Unquoted identifiers must be consistently lower case
  "L029", # L029: prevents use of 'date' as a column name
  "L032", # L032: prevents use of USING joins
  "RF05", # RF05: Do not use special characters in identifiers
  "ST06", # ST06: Select wildcards then simple targets before calculations and aggregates
]

[tool.sqlfluff.indentation]
indented_joins = false
indented_using_on = true
template_blocks_indent = false

[tool.sqlfluff.templater]
unwrap_wrapped_queries = true

[tool.sqlfluff.templater.dbt]
project_dir = "./"

[tool.sqlfluff.templater.jinja]
apply_dbt_builtins = true

[tool.sqlfluff.rules.capitalisation.keywords]
capitalisation_policy = "upper"


##############################
# ✅ liccheck
##############################
[tool.liccheck]
authorized_licenses = [
  "3-clause bsd",
  "apache 2.0",
  "apache license 2.0",
  "apache license, version 2.0",
  "apache software",
  "bsd",
  "bsd 3-clause",
  "bsd-3-clause",
  "freeware",
  "gnu library or lesser general public license (lgpl)",
  "historical permission notice and disclaimer (hpnd)",
  "isc license (iscl)",
  "mit",
  "mozilla public license 2.0 (mpl 2.0)",
  "new bsd",
  "python software foundation",
  "the unlicense (unlicense)",
]
unauthorized_licenses = [
  "gnu general public license (gpl)",
  "gnu general public license v2 (gplv2)",
  "gplv2",
]


##############
# 📣 Towncrier
##############
[tool.towncrier]
package = "IRIS Data Cleanser"
package_dir = "."
filename = "CHANGELOG.md"
directory = ".changelog/"
template = ".changelog/template.md"
title_format = "## [{version}] - {project_date}"
issue_format = "[#{issue}](https://github.com/National-Digital-Twin/IRIS-data-cleanser/issues{issue})"
start_string = "<!-- TOWNCRIER -->\n"
underlines = ["", ""]

# .added for new features
# .changed for changes in existing functionality
# .deprecated for soon-to-be removed features
# .removed for now removed features
# .fixed for any bug fixes
# .security in case of vulnerabilities
# .analysis for data analyses
# .docs for documentation improvements
# .maintenance for maintenance tasks & upgrades
[[tool.towncrier.type]]
directory = "added"
name = "Added"
showcontent = true

[[tool.towncrier.type]]
directory = "changed"
name = "Changed"
showcontent = true

[[tool.towncrier.type]]
directory = "deprecated"
name = "Deprecated"
showcontent = true

[[tool.towncrier.type]]
directory = "removed"
name = "Removed"
showcontent = true

[[tool.towncrier.type]]
directory = "fixed"
name = "Bug Fixes"
showcontent = true

[[tool.towncrier.type]]
directory = "security"
name = "Security"
showcontent = true

[[tool.towncrier.type]]
directory = "analysis"
name = "Analyses"
showcontent = true

[[tool.towncrier.type]]
directory = "docs"
name = "Improved Documentation"
showcontent = true

[[tool.towncrier.type]]
directory = "maintenance"
name = "Maintenance Changes"
showcontent = true
