version: 2

models:
  - name: stg_epc_recommendations
    description: "A dbt model for validating data in the recommendations table"
    # column details taken from: https://epc.opendatacommunities.org/docs/guidance#glossary
    columns:
      - name: lmk_key
        description: Individual lodgement identifier. One:Many joined from a unique field in the certificates table. Uniquely identifies a certificate.
        field_type: VARCHAR 64
        accepted_values:
        tests:
          - not_null
          # - dbt_utils.duplicated
          - relationships:
              to: ref('stg_epc_certificates')
              field: lmk_key

      - name: improvement_item
        description: Used to order the recommendations on the output EPC.
        field_type: INT
        accepted_values:

      - name: improvement_summary_text
        description: A short description of the suggested improvement.
        field_type: VARCHAR 63
        accepted_values:

      - name: improvement_descr_text
        description: Detailed description of the suggested improvement.
        field_type: VARCHAR 1142
        accepted_values:

      - name: improvement_id
        description: Code number associated with the improvement measure.
        field_type: INT
        accepted_values:

      - name: improvement_id_text
        description: The text associated with the improvement measure.
        field_type: VARCHAR 63
        accepted_values:

      - name: indicative_cost
        description: The indicative costs are the cost of installed recommendation measures, which are fixed no matter the type of house being assessed. These are displayed as a cost range on the Energy Performance Certificate as costs vary between individual suppliers.
        field_type: VARCHAR 38
        accepted_values:
