version: 2

models:
  - name: mart_address_base_plus
    description: "Cleaned Address Base Plus Dataset."
    tags: [mart]
    columns:
      - name: UPRN
        quote: true
        description: "Unique Property Reference Number. The UPRN submitted by an assessor or alternatively from the department’s address matching algorithm."
        tests:
          - not_null

      - name: UDPRN
        quote: true
        description: "Unique Delivery Point Reference Number. Unique Delivery Point Reference Number. Royal Mail's Unique Delivery Point Reference Number."
        tests:
          - not_null

      - name: Address
        description: "Detailed address description"
        tests:
          - dbt_expectations.expect_column_values_to_be_in_type_list:
              column_type_list: ["text"]

      - name: PostcodeLocator
        description: "UK postcode locator"
        quote: true
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: "^([A-Z]{1,2}[0-9R][0-9A-Z]? [0-9][A-Z]{2})|(N\/A)$" # UK postcode regex OR ""

      - name: XCoordinate
        description: "X coordinate (Eastings) of the address location"
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: double precision

      - name: YCoordinate
        description: "Y coordinate (Northings) of the address location"
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: double precision

      - name: Latitude
        description: "Latitude coordinate of the address location"
        quote: true
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: double precision
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -90
              max_value: 90

      - name: Longitude
        description: "Longitude coordinate of the address location"
        quote: true
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: double precision
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -180
              max_value: 180

      - name: ParentUPRN
        description: "Parent UPRN if applicable"
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: text

      - name: WardCode
        description: "Code representing the electoral ward of the address"
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: double precision

      - name: LSOA11Code
        description: "Lower layer super output area code"
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: double precision

      - name: COA11Code
        description: "Census output area code 2011"
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: double precision

      - name: ParishCode
        description: "Code representing the civil parish of the address"
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: double precision

      - name: ConservationArea
        description: "Flag indicating if the address is in a conservation area"
        quote: true
        tests:
          - dbt_expectations.expect_column_values_to_be_null
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: double precision
          # - dbt_expectations.expect_column_values_to_be_in_set:
          # value_set: [0, 1] # Assuming binary values, adjust as needed

      - name: NationalPark
        description: "Flag indicating if the address is in a national park"
        quote: true
        tests:
          - dbt_expectations.expect_column_values_to_be_null
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: double precision
          # - dbt_expectations.expect_column_values_to_be_in_set:
          # value_set: [0, 1] # Assuming binary values, adjust as needed

      - name: WorldHeritageSite
        description: "Flag indicating if the address is in a world heritage site"
        quote: true
        tests:
          - dbt_expectations.expect_column_values_to_be_null
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: double precision
          # - dbt_expectations.expect_column_values_to_be_in_set:
          # value_set: [0, 1] # Assuming binary values, adjust as needed

      - name: AONB
        description: "Flag indicating if the address is in an area of natural beauty"
        quote: true
        tests:
          - dbt_expectations.expect_column_values_to_be_null
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: double precision
          # - dbt_expectations.expect_column_values_to_be_in_set:
          # value_set: [0, 1] # Assuming binary values, adjust as needed

      - name: Class
        description: "Classification code of the address"
        quote: true
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: text

      - name: ClassDescription
        description: "Description of the class code"
        quote: true
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: text

    meta:
      owner: "data_engineering_team"
