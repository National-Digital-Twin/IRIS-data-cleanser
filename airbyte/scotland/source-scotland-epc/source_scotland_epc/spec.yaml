documentationUrl: http://statistics.gov.scot/graph/domestic-energy-performance-certificates/metadata
connectionSpecification:
  $schema: http://json-schema.org/draft-07/schema#
  title: Scottish Domestic/Non-Domestic EPC recommendations & certificates API Spec
  type: object
  required:
    - property_type
    - data_type
  properties:
    property_type:
      type: string
      enum: ["domestic", "non-domestic"]
      default: "domestic"
      description: The type of property to fetch EPC data for.
      order: 0
    data_type:
      type: string
      enum: ["certificates", "recommendations"]
      default: "certificates"
      description: Specify whether to fetch certificates or recommendations.
      order: 1
