version: 2

models:
  - name: epc_with_uprn
    description: >
      EPC records with a non-null UPRN matched against Ordnance Survey Places DPA and LPI datasets.
      If DPA data is available it is preferred, otherwise LPI data is used.
    columns:
      - name: uprn
        description: "Unique Property Reference Number."
        tests:
          - not_null
      - name: postcode
        description: "Postcode for the building address."
      - name: address
        description: "Preferred address from Ordnance Survey Places, fallback to EPC address if necessary."
      - name: fuzzy_matched
        description: "Indicator whether UPRN came from EPC directly (0) or fuzzy matching (1). Always 0 for this model."
    meta:
      owner: "data_engineering_team"
