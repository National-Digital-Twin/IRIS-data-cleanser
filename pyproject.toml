###########
# 📜 Poetry
###########
[tool.poetry]
name = "IRIS Data Cleanser"
version = "0.1.0"
description = "IRIS Data Cleanser - ETL pipeline using Airbyte, dbt (targeting Postgres), loading into S3."
license = "UNLICENSED"
classifiers = ["Private :: Do Not Upload"]
packages = [
  { include = "IRIS Data Cleanser", from = "IRIS Data Cleanser" },
  # Add more packages here, e.g.
  # { include = "module_name", from = "IRIS Data Cleanser" },
]

[tool.poetry.dependencies]
python = ">=3.11,<3.12"
# Everything below here is alphabetically sorted
airbyte-cdk = "<4.3.2"
boto3 = "^1.34.158"
cryptography = ">=43.0.1"
dbt-core = "<=1.5.5"
dbt-fal = "^1.5.9"
dbt-postgres = "<1.8.2"
fastapi = ">=0.109.1"
fuzzymatcher = "^0.0.6"
isolate = "^0.14.2"
ipywidgets = "^8.1.3"
joblib = "^1.4.2"
jsonschema = "<3.3.0"
jupyterlab = "<4"
jupyterlab-widgets = "^3.0.11"
numpy = "^1.26.4"
openpyxl = "^3.1.5"
pandarallel = "^1.6.5"
pandas = "<2.0"
pickleshare = "^0.7.5"
pyproj = "^3.6.1"
pyyaml = "^6.0.2"
rapidfuzz = "^3.9.6"
requests = "^2.32.3"
sqlparse = ">=0.5.0"
tqdm = "^4.66.5"
typer = "^0.9.0"
folium = "^0.17.0"
geopy = "^2.4.1"
matplotlib = "^3.9.2"
plotly = "^5.23.0"

[tool.poetry.dev-dependencies]
# Everything below here is alphabetically sorted
bandit = "^1.7.9"
detect-secrets = "^1.5.0"
ipdb = "^0.13.13"
jupyter-black = "^0.3.4"
liccheck = "^0.9.2"
pip-audit = "^2.7.3"
pre-commit = "^3.8.0"
pytest = "^7.4.4"
pytest-mock = "^3.14.0"
requests-mock = "^1.12.1"
ruff = "^0.1.13"
sqlfluff = "^2.3.5"
towncrier = "^22.12.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

############
# ✅ Linters
############
# [tool.pylint."MESSAGES CONTROL"]
# disable = [
#   "locally-disabled",
#   "logging-fstring-interpolation",
#   "missing-class-docstring",
#   "no-else-break",
