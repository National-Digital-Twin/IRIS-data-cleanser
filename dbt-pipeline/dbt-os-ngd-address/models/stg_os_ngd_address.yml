version: 2

sources:
  - name: postgres
    schema: "{{ env_var('DB_SCHEMA', 'public') }}"
    tables:
      - name: os_ngd_address

models:
  - name: stg_os_ngd_address
    description: "Pass-through staging model for OS NGD Address with light type coercions."
    columns:
      - name: uprn
        description: "Unique Property Reference Number."
        tests:
          - not_null
          - unique
      - name: versiondate
        description: "Date when the version was last updated."
        tests: [not_null]
      - name: versionavailablefromdate
        description: "Date this version became the latest version."
        tests: [not_null]
      - name: versionavailabletodate
        description: "Date this version was superseded."
      - name: changetype
        description: "Type of change that generated a new version."
        tests: [not_null]
      - name: theme
        description: "OS NGD theme."
        tests: [not_null]
      - name: description
        description: "Quick description of the feature."
        tests: [not_null]
      - name: organisationname
        description: "Name of the organisation operating from the address."
      - name: poboxnumber
        description: "PO Box or BFPO number."
      - name: subname
        description: "Secondary description for subdivisions of properties."
      - name: name
        description: "Primary description applied to an address."
      - name: number
        description: "Street number identifier."
      - name: streetname
        description: "Nearest accessible street name."
        tests: [not_null]
      - name: locality
        description: "Area or geographical identifier within a settlement."
      - name: townname
        description: "Settlement name."
      - name: islandname
        description: "Island name (where applicable)."
      - name: postcode
        description: "Postcode unit."
        tests: [not_null]
      - name: fulladdress
        description: "Concatenated full address."
        tests: [not_null]
      - name: country
        description: "Country where the address is located."
        tests: [not_null]
      - name: alternatelanguagesubname
        description: "Alternate language sub name."
      - name: alternatelanguagename
        description: "Alternate language primary name."
      - name: alternatelanguagenumber
        description: "Alternate language street number."
      - name: alternatelanguagestreetname
        description: "Alternate language street name."
      - name: alternatelanguagelocality
        description: "Alternate language locality."
      - name: alternatelanguagetownname
        description: "Alternate language town name."
      - name: alternatelanguageislandname
        description: "Alternate language island name."
      - name: alternatelanguage
        description: "ISO 3166-3 language code."
      - name: alternatelanguagefulladdress
        description: "Concatenated alternate language full address."
      - name: floorlevel
        description: "Floor level(s) the address occupies."
      - name: lowestfloorlevel
        description: "Lowest floor level when multiple levels are present."
      - name: highestfloorlevel
        description: "Highest floor level when multiple levels are present."
      - name: classificationcode
        description: "AddressBase classification code."
        tests: [not_null]
      - name: classificationdescription
        description: "Description of the classification code."
        tests: [not_null]
      - name: primaryclassificationdescription
        description: "Primary classification description."
        tests: [not_null]
      - name: secondaryclassificationdescription
        description: "Secondary classification description."
      - name: tertiaryclassificationdescription
        description: "Tertiary classification description."
      - name: quaternaryclassificationdescription
        description: "Quaternary classification description."
      - name: buildstatus
        description: "Build status of the address."
        tests: [not_null]
      - name: buildstatusdate
        description: "Date the address entered the build status."
      - name: addressstatus
        description: "Lifecycle status of the address."
        tests: [not_null]
      - name: postcodesource
        description: "Source of the postcode assigned to the address."
        tests: [not_null]
      - name: parentuprn
        description: "Parent UPRN, if a hierarchy exists."
      - name: rootuprn
        description: "Root UPRN at the top of the hierarchy."
      - name: hierarchylevel
        description: "Position within the address hierarchy."
        tests: [not_null]
      - name: usrn
        description: "Unique Street Reference Number."
        tests: [not_null]
      - name: usrnmatchindicator
        description: "Type of match between UPRN and USRN."
        tests: [not_null]
      - name: localcustodiancode
        description: "Code of the authority assigning the UPRN."
        tests: [not_null]
      - name: localcustodiandescription
        description: "Description of the assigning authority."
        tests: [not_null]
      - name: lowertierlocalauthoritygsscode
        description: "GSS code for the lower tier local authority."
      - name: easting
        description: "X coordinate (EPSG:27700)."
        tests: [not_null]
      - name: northing
        description: "Y coordinate (EPSG:27700)."
        tests: [not_null]
      - name: latitude
        description: "Latitude (ETRS89)."
        tests: [not_null]
      - name: longitude
        description: "Longitude (ETRS89)."
        tests: [not_null]
      - name: geometry
        description: "Point geometry (WKT)."
        tests: [not_null]
      - name: positionalaccuracy
        description: "Description of coordinate positional accuracy."
        tests: [not_null]
      - name: effectivestartdate
        description: "Date the record was inserted into the LA database."
        tests: [not_null]
      - name: effectiveenddate
        description: "Date the record ceased to exist."
