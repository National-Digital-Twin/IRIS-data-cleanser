documentationUrl: https://epc.opendatacommunities.org/docs/api/domestic#domestic-recommendations
connectionSpecification:
  $schema: http://json-schema.org/draft-07/schema#
  title: EPC Recommendations API Spec
  type: object
  required:
    - auth_key
    - start_year
    - end_year
    - local_authority_list
  properties:
    auth_key:
      type: string
      description: Authorization key
      examples:
        - "Basic abc123abc123"
      order: 0
    start_year:
      type: integer
      description: Start year
      default: 2008
      order: 1
    end_year:
      type: integer
      description: End year
      default: 2024
      order: 2
    local_authority_list:
      type: string
      description: Comma-separated list of local authorities
      default: "E06000046,E06000011"
      order: 3
