version: 6.48.15

type: DeclarativeSource

check:
  type: CheckStream
  stream_names:
    - os-ngd-buildings

definitions:
  base_requester:
    type: HttpRequester
    url_base: https://api.os.uk
    authenticator:
      type: ApiKeyAuthenticator
      api_token: "{{ config[\"api_key\"] }}"
      inject_into:
        type: RequestOption
        field_name: key
        inject_into: header
    error_handler:
      type: DefaultErrorHandler
      response_filters:
        - type: HttpResponseFilter
          http_codes: [429, 500, 503]
          action: RETRY
      backoff_strategies:
        - type: WaitTimeFromHeader
          header: Retry-After

  paginator:
    type: DefaultPaginator
    page_token_option:
      type: RequestOption
      field_name: offset
      inject_into: request_parameter
    page_size_option:
      type: RequestOption
      field_name: limit
      inject_into: request_parameter
    pagination_strategy:
      type: OffsetIncrement
      page_size: 100
      inject_on_first_request: true

  streams:
    os-ngd-buildings-se:
      type: DeclarativeStream
      name: os-ngd-buildings-se
      primary_key: []
      retriever:
        type: SimpleRetriever
        decoder:
          type: JsonDecoder
        paginator:
          $ref: "#/definitions/paginator"
        requester:
          $ref: "#/definitions/base_requester"
          path: /features/ngd/ofa/v1/collections/bld-fts-building-4/items
          http_method: GET
          request_parameters:
            bbox: "{{ (stream_partition['tile'].split('|'))[0] }}"
            bbox-crs: http://www.opengis.net/def/crs/EPSG/0/27700
            filter: "buildinguse='Residential Accommodation'"
        record_selector:
          type: RecordSelector
          extractor:
            type: DpathExtractor
            field_path:
              - features
              - "*"
              - properties
        partition_router:
          type: ListPartitionRouter
          values: "{{ (config.get('tiles_text_se') or '').split('|||') }}"
          cursor_field: tile
      schema_loader:
        type: InlineSchemaLoader
        schema:
          type: object
          $schema: http://json-schema.org/schema#
      transformations:
        - type: AddFields
          fields:
            - type: AddedFieldDefinition
              path:
                - region
              value: "{{ stream_partition['tile'].split('|')[1] if '|' in stream_partition['tile'] else None }}"

    os-ngd-buildings-sw:
